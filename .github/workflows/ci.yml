name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-push:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=dev --ignore-scripts

      - name: Run Lint
        run: |
          if npm run | grep -q lint; then
            npm run lint
          else
            npx eslint . || echo "No lint configured"
          fi

      - name: Run Tests
        run: |
          if npm run | grep -q test; then
            npm test
          else
            echo "No tests defined"
          fi

      - name: Build App
        run: |
          if npm run | grep -q build; then
            npm run build
          else
            echo "No build step"
          fi

